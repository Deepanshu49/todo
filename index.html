<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Simple To‑Do</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Simple To‑Do</h1>
      <p class="sub">Tiny, local-only to-do list (stored in localStorage)</p>
    </header>

    <section class="new-task">
      <input id="task-input" type="text" placeholder="Add a task and press Enter" aria-label="New task">
      <button id="add-btn" class="btn">Add</button>
    </section>

    <ul id="tasks" class="tasks" aria-live="polite"></ul>

    <div class="footer">
      <span id="count">0 tasks</span>
      <div class="actions">
        <button id="clear-completed" class="btn small">Clear Completed</button>
        <button id="clear-all" class="btn small ghost">Clear All</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
